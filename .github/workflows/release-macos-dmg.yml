name: Release macOS DMG

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing version tag to build and publish (for example: v0.1.2)
        required: true

permissions:
  contents: write

jobs:
  release-macos-dmg:
    name: Build and Release DMG
    runs-on: macos-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAURI_BUNDLER_DMG_IGNORE_CI: "true"
    steps:
      - name: Resolve release refs
        id: vars
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            release_tag="${{ github.event.inputs.tag }}"
            checkout_ref="${release_tag}"
          else
            release_tag="${GITHUB_REF_NAME}"
            checkout_ref="${GITHUB_REF}"
          fi

          if [[ ! "$release_tag" =~ ^v[0-9]+(\.[0-9]+)*([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release tag: $release_tag" >&2
            exit 1
          fi

          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "checkout_ref=$checkout_ref" >> "$GITHUB_OUTPUT"

      - name: Check out code
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.vars.outputs.checkout_ref }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install frontend dependencies
        run: npm ci

      - name: Build app and upload release assets
        uses: tauri-apps/tauri-action@v0.6.2
        with:
          tagName: ${{ steps.vars.outputs.release_tag }}
          releaseName: ${{ steps.vars.outputs.release_tag }}
          releaseBody: |
            Automated macOS DMG release built by GitHub Actions.

            Trigger methods:
            - Push a version tag like `v0.1.3`
            - Manually dispatch this workflow for an existing tag

            Included assets:
            - macOS `.app`
            - macOS `.dmg`
          releaseDraft: false
          prerelease: false
          generateReleaseNotes: true
          args: --target aarch64-apple-darwin
